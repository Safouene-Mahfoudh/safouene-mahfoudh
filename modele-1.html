<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 1</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 8px 8px 0px #1a1a2e, 0 20px 60px rgba(0,0,0,0.12);
    animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(20px) rotate(-1deg); }
    to   { opacity: 1; transform: translateY(0) rotate(0); }
  }

  /* Diagonal color block top */
  .hero {
    background: #1a1a2e;
    padding: 32px 28px 48px;
    position: relative;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 0 100%);
  }

  .hero-tag {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00e5ff;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(0,229,255,0.1);
    border: 2px solid rgba(0,229,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }

  .avatar-initials {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #00e5ff;
    letter-spacing: 1px;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .name span { color: #00e5ff; }

  .title {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 6px;
  }

  /* Links */
  .links {
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    text-decoration: none;
    color: #1a1a2e;
    border-bottom: 1px solid #f0f0f0;
    transition: all 0.2s;
    cursor: pointer;
  }

  .link-item:last-child { border-bottom: none; }

  .link-item:hover, .link-item:active {
    color: #00a0b8;
    padding-left: 6px;
  }

  .link-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a1a2e;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }

  .link-item:hover .link-dot {
    background: #00e5ff;
    transform: scale(1.4);
  }

  .link-text { flex: 1; }

  .link-label {
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #aaa;
    font-family: 'Syne', sans-serif;
  }

  .link-value {
    font-size: 13.5px;
    font-weight: 400;
    margin-top: 1px;
  }

  .link-arrow {
    font-size: 16px;
    color: #ddd;
    transition: color 0.2s, transform 0.2s;
  }

  .link-item:hover .link-arrow {
    color: #00e5ff;
    transform: translateX(4px);
  }

  .footer {
    background: #f7f7f7;
    padding: 12px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-label {
    font-family: 'Syne', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #bbb;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #00e5ff;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="hero-tag">// Carte de visite</div>
    <div class="avatar"><span class="avatar-initials">SM</span></div>
    <div class="name">SAFOUENE<br><span>MAHFOUDH</span></div>
    <div class="title">IoT Developer · Industrie 4.0</div>
  </div>

  <div class="links">
    <a href="mailto:safouene.mahfoudh@gmail.com" class="link-item">
      <div class="link-dot"></div>
      <div class="link-text">
        <div class="link-label">Email</div>
        <div class="link-value">safouene.mahfoudh@gmail.com</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <div class="link-item" onclick="openContact()">
      <div class="link-dot"></div>
      <div class="link-text">
        <div class="link-label">Téléphone</div>
        <div class="link-value">+33 6 00 00 00 00</div>
      </div>
      <span class="link-arrow">→</span>
    </div>

    <a href="https://linkedin.com/in/tonprofil" target="_blank" class="link-item">
      <div class="link-dot"></div>
      <div class="link-text">
        <div class="link-label">LinkedIn</div>
        <div class="link-value">linkedin.com/in/tonprofil</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a href="https://tonsite.com" target="_blank" class="link-item">
      <div class="link-dot"></div>
      <div class="link-text">
        <div class="link-label">Site Web</div>
        <div class="link-value">tonsite.com</div>
      </div>
      <span class="link-arrow">→</span>
    </a>
  </div>

  <div class="footer">
    <span class="footer-label">IoT · Industrie 4.0</span>
    <div class="footer-dot"></div>
    <span class="footer-label">2025</span>
  </div>
</div>

<script>
  function openContact() {
    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Safouene_Mahfoudh.vcf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
