<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #161b27;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #1e2535;
    box-shadow: 0 0 0 1px rgba(57,255,20,0.05), 0 30px 80px rgba(0,0,0,0.5);
    animation: appear 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top section */
  .top {
    padding: 28px 28px 24px;
    border-bottom: 1px solid #1e2535;
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .avatar {
    width: 68px; height: 68px;
    border-radius: 10px;
    background: #1e2535;
    border: 1px solid rgba(57,255,20,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .avatar-initials {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #39ff14;
    letter-spacing: 1px;
  }

  .identity {}

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: #39ff14;
    opacity: 0.7;
    margin-bottom: 6px;
  }

  .name {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #e8edf5;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .name span { color: #39ff14; }

  .title {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #4a5568;
    margin-top: 5px;
  }

  /* Stats row */
  .stats {
    display: flex;
    border-bottom: 1px solid #1e2535;
  }

  .stat {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    border-right: 1px solid #1e2535;
  }

  .stat:last-child { border-right: none; }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #39ff14;
    font-weight: 700;
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #4a5568;
    margin-top: 2px;
  }

  /* Links */
  .links {
    padding: 12px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 10px;
    text-decoration: none;
    color: #8899aa;
    border-radius: 8px;
    transition: all 0.18s;
    cursor: pointer;
  }

  .link-item:hover, .link-item:active {
    background: rgba(57,255,20,0.05);
    color: #e8edf5;
  }

  .link-item:hover .icon, .link-item:active .icon {
    border-color: rgba(57,255,20,0.4);
    background: rgba(57,255,20,0.08);
  }

  .link-item:hover .icon svg, .link-item:active .icon svg { fill: #39ff14; }

  .icon {
    width: 34px; height: 34px;
    border: 1px solid #1e2535;
    border-radius: 8px;
    background: #1a1f2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .icon svg {
    width: 14px; height: 14px;
    fill: #4a5568;
    transition: fill 0.18s;
  }

  .link-text { display: flex; flex-direction: column; gap: 1px; }

  .link-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #39ff14;
    opacity: 0.5;
  }

  .link-value { font-size: 12.5px; font-weight: 300; }

  /* Footer */
  .footer {
    margin: 0 20px 20px;
    padding: 10px 14px;
    background: #1a1f2e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #39ff14;
    box-shadow: 0 0 6px #39ff14;
    flex-shrink: 0;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  .footer-text {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: #4a5568;
    text-transform: uppercase;
  }
</style>
</head>

<script>

    document.body.appendChild(a); a.click();
