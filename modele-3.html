<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #f5f3ee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fafaf8;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid #e8e4dc;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Left accent bar */
  .hero {
    display: flex;
    position: relative;
  }

  .accent-bar {
    width: 5px;
    background: linear-gradient(180deg, #ff6b35, #ff9500);
    flex-shrink: 0;
  }

  .hero-content {
    padding: 32px 24px 28px;
    flex: 1;
  }

  .hero-tag {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff6b35;
    margin-bottom: 12px;
  }

  .avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #ede9e0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }

  .avatar-initials {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 1px;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #1c1a17;
    line-height: 1.15;
  }

  .name em {
    font-style: normal;
    color: #ff6b35;
  }

  .divider-name {
    width: 40px;
    height: 2px;
    background: #ff6b35;
    margin: 12px 0;
  }

  .title {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a9080;
  }

  /* Links */
  .links {
    padding: 8px 0 20px;
    border-top: 1px solid #e8e4dc;
    margin: 0 24px;
  }

  .links { margin: 0; padding: 0 0 8px; }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    text-decoration: none;
    color: #3a3630;
    border-bottom: 1px solid #f0ece4;
    transition: all 0.18s;
    cursor: pointer;
  }

  .link-item:last-child { border-bottom: none; }

  .link-item:hover, .link-item:active {
    background: #fff8f4;
    color: #ff6b35;
  }

  .link-icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #f0ece4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s;
  }

  .link-item:hover .link-icon, .link-item:active .link-icon {
    background: #ffe8dc;
  }

  .link-icon svg {
    width: 13px; height: 13px;
    fill: #9a9080;
    transition: fill 0.18s;
  }

  .link-item:hover .link-icon svg, .link-item:active .link-icon svg {
    fill: #ff6b35;
  }

  .link-text { flex: 1; }

  .link-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0b8a8;
    font-weight: 400;
  }

  .link-value {
    font-size: 13px;
    font-weight: 300;
    margin-top: 1px;
  }

  /* Footer */
  .footer {
    background: #1c1a17;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer span {
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #4a453e;
  }

  .footer-accent { color: #ff6b35 !important; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="accent-bar"></div>
    <div class="hero-content">
      <div class="hero-tag">IoT Developer</div>
      <div class="avatar"><span class="avatar-initials">SM</span></div>
      <div class="name">Safouene<br><em>Mahfoudh</em></div>
      <div class="divider-name"></div>
      <div class="title">Industrie 4.0</div>
    </div>
  </div>

  <div class="links">
    <a href="mailto:safouene.mahfoudh@gmail.com" class="link-item">

      <div class="link-text">

    <div class="link-item" onclick="openContact()">

      <div class="link-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM9 17H6.5v-7H9v7zm-1.3-8a1.3 1.3 0 1 1 0-2.6 1.3 1.3 0 0 1 0 2.6zm9.3 8h-2.5v-3.8c0-1-.8-1.2-1-1.2s-1 .1-1 1.2V17h-2.5v-7H13v1s.8-1 2.5-1 2.5 1.5 2.5 3.5V17z"/></svg></div>
      <div class="link-text">

    <a href="https://tonsite.com" target="_blank" class="link-item">
      <div class="link-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>
      <div class="link-text">
        <div class="link-label">Site Web</div>
        <div class="link-value">tonsite.com</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <span>2025</span>
    <span class="footer-accent">Safouene Mahfoudh</span>
    <span>IoT</span>
  </div>
</div>

<script>
  function openContact() {
    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Safouene_Mahfoudh.vcf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
