<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 4</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Raleway', sans-serif;
    background: linear-gradient(135deg, #e8f4f8 0%, #ddeef5 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 4px rgba(0,120,160,0.04), 0 8px 32px rgba(0,120,160,0.1), 0 32px 80px rgba(0,80,120,0.12);
    animation: appear 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Split header */
  .header {
    display: grid;
    grid-template-columns: 100px 1fr;
    min-height: 140px;
  }

  .header-left {
    background: linear-gradient(160deg, #0077a8, #00b4d8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px 12px;
  }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-initials {
    font-family: 'Raleway', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    text-transform: uppercase;
  }

  .header-right {
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-bottom: 1px solid #edf4f8;
  }

  .name {
    font-size: 20px;
    font-weight: 700;
    color: #0a2a38;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .name span { color: #0077a8; }

  .title {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7aabb8;
    margin-top: 8px;
  }

  .title-sep {
    width: 24px;
    height: 2px;
    background: linear-gradient(90deg, #0077a8, #00b4d8);
    border-radius: 2px;
    margin-top: 10px;
  }

  /* Links */
  .links {
    padding: 10px 0 16px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    text-decoration: none;
    color: #2a4a58;
    transition: all 0.18s;
    cursor: pointer;
  }

  .link-item:hover, .link-item:active {
    background: #f0f8fc;
    color: #0077a8;
  }

  .link-item:hover .link-icon, .link-item:active .link-icon {
    background: #e0f3fa;
    border-color: #00b4d8;
  }

  .link-item:hover .link-icon svg, .link-item:active .link-icon svg {
    fill: #0077a8;
  }

  .link-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #f4f9fc;
    border: 1px solid #ddeef5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .link-icon svg {
    width: 13px; height: 13px;
    fill: #7aabb8;
    transition: fill 0.18s;
  }

  .link-text { flex: 1; }

  .link-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7aabb8;
  }

  .link-value {
    font-size: 12.5px;
    font-weight: 300;
    margin-top: 1px;
  }

  /* Footer */
  .footer {
    background: linear-gradient(90deg, #0077a8, #00b4d8);
    padding: 10px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="card">

<script>
  function openContact() {
    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });

    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>

</html>
