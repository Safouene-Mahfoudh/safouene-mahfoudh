<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 5</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Mulish', sans-serif;
    background: #e9e9e9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.14);
    animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .top-stripe {
    height: 4px;
    background: #e63946;
  }

  .hero {
    padding: 36px 32px 28px;
    border-bottom: 1px solid #f0f0f0;
    position: relative;
  }

  .initials-bg {
    position: absolute;
    top: 20px;
    right: 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: #f5f5f5;
    letter-spacing: -2px;
    line-height: 1;
    user-select: none;
  }

  .tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e63946;
    margin-bottom: 18px;
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: #111;
    line-height: 0.95;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }

  .links {
    padding: 0;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 0;
    text-decoration: none;
    color: #222;
    border-bottom: 1px solid #f4f4f4;
    transition: all 0.18s;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: #e63946;
    transition: width 0.2s cubic-bezier(0.16,1,0.3,1);
  }

  .link-item:hover::before, .link-item:active::before { width: 3px; }

  .link-item:hover, .link-item:active { background: #fafafa; }

  .link-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    color: #ddd;
    padding: 0 14px;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: color 0.18s;
    padding-left: 20px;
  }

  .link-item:hover .link-num, .link-item:active .link-num { color: #e63946; }

  .link-sep {
    width: 1px;
    height: 36px;
    background: #f0f0f0;
    flex-shrink: 0;
  }

  .link-text {
    padding: 14px 16px;
    flex: 1;
  }

  .link-label {
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #ccc;
    font-weight: 600;
  }

  .link-value {
    font-size: 13px;
    font-weight: 300;
    margin-top: 2px;
    color: #333;
  }

  .link-item:hover .link-value, .link-item:active .link-value { color: #111; }

  .footer {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
  }

  .footer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: #fff;
    letter-spacing: 2px;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #e63946;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

  .footer-year {
    font-size: 9px;
    letter-spacing: 2px;
    color: #444;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-stripe"></div>
  <div class="hero">
    <div class="initials-bg">SM</div>
    <div class="tag">IoT Developer · Industrie 4.0</div>
    <div class="name">SAFOUENE<br>MAHFOUDH</div>
    <div class="title">Développeur IoT & Systèmes embarqués</div>
  </div>

  <div class="links">
    <a href="mailto:safouene.mahfoudh@gmail.com" class="link-item">
      <span class="link-num">01</span>
      <div class="link-sep"></div>
      <div class="link-text">
        <div class="link-label">Email</div>
        <div class="link-value">safouene.mahfoudh@gmail.com</div>
      </div>
    </a>
    <div class="link-item" onclick="openContact()">
      <span class="link-num">02</span>
      <div class="link-sep"></div>
      <div class="link-text">
        <div class="link-label">Téléphone</div>
        <div class="link-value">+33 6 00 00 00 00</div>
      </div>
    </div>
    <a href="https://linkedin.com/in/tonprofil" target="_blank" class="link-item">
      <span class="link-num">03</span>
      <div class="link-sep"></div>
      <div class="link-text">
        <div class="link-label">LinkedIn</div>
        <div class="link-value">linkedin.com/in/tonprofil</div>
      </div>
    </a>
    <a href="https://tonsite.com" target="_blank" class="link-item">
      <span class="link-num">04</span>
      <div class="link-sep"></div>
      <div class="link-text">
        <div class="link-label">Site Web</div>
        <div class="link-value">tonsite.com</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <span class="footer-name">S. MAHFOUDH</span>
    <div class="footer-dot"></div>
    <span class="footer-year">2025</span>
  </div>
</div>

<script>
  function openContact() {
    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Safouene_Mahfoudh.vcf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
