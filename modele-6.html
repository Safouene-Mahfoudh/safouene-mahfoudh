<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 6</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: #1b2438;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #f8f6f2;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    animation: appear 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Full-width navy header */
  .hero {
    background: #1b2438;
    padding: 36px 30px 32px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    bottom: -30px; right: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.03);
  }

  .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .hero-line {
    width: 24px; height: 1px;
    background: rgba(200,185,150,0.5);
  }

  .hero-tag {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,185,150,0.6);
    font-weight: 300;
  }

  .avatar {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 1px solid rgba(200,185,150,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.03);
  }

  .avatar-initials {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(200,185,150,0.9);
    letter-spacing: 2px;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    color: #f0ece4;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  .name strong {
    font-weight: 600;
    color: #fff;
  }

  .title {
    font-size: 9px;
    font-weight: 200;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(200,185,150,0.55);
    margin-top: 10px;
  }

  /* Links on light bg */
  .links {
    padding: 6px 0 6px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 13px 30px;
    text-decoration: none;
    color: #2a3040;
    border-bottom: 1px solid #eeeae2;
    transition: all 0.2s;
    cursor: pointer;
  }

  .link-item:last-child { border-bottom: none; }

  .link-item:hover, .link-item:active {
    background: #f2efe8;
    padding-left: 34px;
  }

  .link-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #eeeae2;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .link-item:hover .link-icon, .link-item:active .link-icon {
    background: #1b2438;
  }

  .link-icon svg {
    width: 12px; height: 12px;
    fill: #8a8070;
    transition: fill 0.2s;
  }

  .link-item:hover .link-icon svg, .link-item:active .link-icon svg {
    fill: rgba(200,185,150,0.9);
  }

  .link-text { flex: 1; }

  .link-label {
    font-size: 7.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #b0a890;
    font-weight: 400;
  }

  .link-value {
    font-size: 12.5px;
    font-weight: 300;
    margin-top: 1px;
    color: #3a3428;
  }

  .footer {
    background: #1b2438;
    padding: 11px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer span {
    font-family: 'Jost', sans-serif;
    font-size: 7.5px;
    letter-spacing: 2.5px;
    color: rgba(200,185,150,0.35);
    text-transform: uppercase;
    font-weight: 200;
  }

  .footer-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(200,185,150,0.5);
    animation: blink 3s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
</style>
</head>

      <div class="link-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>

  <div class="footer">

  </div>
</div>

<script>
  function openContact() {
    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Safouene_Mahfoudh.vcf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>

</html>
