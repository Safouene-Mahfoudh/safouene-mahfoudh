<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 50%, #003355 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background orbs */
  body::before {
    content: '';
    position: fixed;
    top: -10%; left: -10%;
    width: 50%; height: 50%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,40,200,0.25), transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -10%; right: -10%;
    width: 50%; height: 50%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,140,255,0.2), transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    animation: appear 0.7s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    z-index: 1;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .hero {
    padding: 32px 28px 26px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .avatar {
    width: 78px; height: 78px;
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }

  .identity {}

  .name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .name span {
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
  }

  /* Pills row */
  .pills {
    display: flex;
    gap: 8px;
    padding: 16px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* Links */
  .links {
    padding: 10px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 10px;
    text-decoration: none;
    color: rgba(255,255,255,0.75);
    border-radius: 12px;
    transition: all 0.18s;
    cursor: pointer;
  }

  .link-item:hover, .link-item:active {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  .link-item:hover .link-icon, .link-item:active .link-icon {
    background: rgba(167,139,250,0.2);
    border-color: rgba(167,139,250,0.4);
  }

  .link-item:hover .link-icon svg, .link-item:active .link-icon svg {
    fill: #a78bfa;
  }

  .link-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .link-icon svg {
    width: 14px; height: 14px;
    fill: rgba(255,255,255,0.4);
    transition: fill 0.18s;
  }

  .link-text { display: flex; flex-direction: column; gap: 1px; }

  .link-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
  }

  .link-value { font-size: 13px; font-weight: 300; }

  /* Footer */
  .footer {
    margin: 0 20px 20px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer span {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    font-weight: 300;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #a78bfa;
    box-shadow: 0 0 8px #a78bfa;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
</style>
</head>
