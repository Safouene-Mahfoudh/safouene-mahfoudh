<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 8</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Figtree:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Figtree', sans-serif;
    background: #fdf6ee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid #ede8df;
    box-shadow: 0 20px 60px rgba(80,50,20,0.08);
    animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top band with geometry */
  .hero {
    background: #0d3d3a;
    padding: 28px 28px 26px;
    position: relative;
    overflow: hidden;
  }

  /* Geometric triangle accent */
  .hero::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 90px 90px 0;
    border-color: transparent rgba(0,180,150,0.15) transparent transparent;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 40px 0 0 40px;
    border-color: transparent transparent transparent rgba(0,180,150,0.08);
  }

  .hero-tag {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #00b496;
    margin-bottom: 18px;
    font-weight: 300;
  }

  .avatar {
    width: 56px; height: 56px;
    border-radius: 4px;
    background: rgba(0,180,150,0.1);
    border: 1px solid rgba(0,180,150,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .avatar-initials {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #00b496;
    letter-spacing: 1px;
  }

  .name {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .name span { color: #00b496; }

  .title {
    font-size: 9px;
    font-weight: 200;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
  }

  /* Links */
  .links {
    padding: 4px 0 8px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 28px;
    text-decoration: none;
    color: #2a2a22;
    border-bottom: 1px solid #f4f0e8;
    transition: all 0.18s;
    cursor: pointer;
  }

  .link-item:last-child { border-bottom: none; }

  .link-item:hover, .link-item:active {
    background: #f5faf9;
    color: #0d3d3a;
  }

  .link-item:hover .link-icon, .link-item:active .link-icon {
    background: #e0f5f0;
    border-color: #00b496;
  }

  .link-item:hover .link-icon svg, .link-item:active .link-icon svg {
    fill: #00b496;
    opacity: 1;
  }

  .link-icon {
    width: 32px; height: 32px;
    border-radius: 4px;
    background: #f4f0e8;
    border: 1px solid #ede8df;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .link-icon svg {
    width: 13px; height: 13px;
    fill: #8a8070;
    opacity: 0.7;
    transition: all 0.18s;
  }

  .link-text { flex: 1; }

  .link-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #b0a890;
    font-weight: 300;
  }

  .link-value {
    font-size: 12.5px;
    font-weight: 300;
    margin-top: 2px;
  }

  /* Footer */
  .footer {
    background: #0d3d3a;
    padding: 11px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer span {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    font-weight: 300;
  }

  .footer-mark {
    width: 20px; height: 2px;
    background: #00b496;
    border-radius: 1px;
  }
</style>
</head>
