<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safouene Mahfoudh — Modèle 9</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Archivo', sans-serif;
    background: #f2f2f2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    overflow: hidden;
    border: 2px solid #111;
    box-shadow: 6px 6px 0 #111;
    animation: appear 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translate(-6px, -6px); }
    to   { opacity: 1; transform: translate(0,0); }
  }

  /* Bold top half */
  .hero {
    background: #111;
    padding: 28px 28px 24px;
  }

  .hero-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .hero-tag {
    font-family: 'Archivo', sans-serif;
    font-size: 8px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #555;
  }

  .hero-year {
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    color: #333;
    letter-spacing: 1px;
  }

  .avatar {
    width: 54px; height: 54px;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .avatar-initials {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    color: #fff;
    letter-spacing: 2px;
  }

  .name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    color: #fff;
    line-height: 1.0;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }

  /* Yellow accent word */
  .name span { color: #f5e642; }

  .title {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444;
    margin-top: 10px;
    border-top: 1px solid #222;
    padding-top: 10px;
  }

  /* Links */
  .links { padding: 0; }

  .link-item {
    display: flex;
    align-items: stretch;
    text-decoration: none;
    color: #111;
    border-bottom: 2px solid #111;
    transition: background 0.15s;
    cursor: pointer;
    min-height: 54px;
  }

  .link-item:last-child { border-bottom: none; }

  .link-item:hover, .link-item:active {
    background: #f5e642;
  }

  .link-side {
    width: 48px;
    border-right: 2px solid #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #f9f9f9;
    transition: background 0.15s;
  }

  .link-item:hover .link-side, .link-item:active .link-side {
    background: #ede135;
  }

  .link-side svg {
    width: 14px; height: 14px;
    fill: #111;
  }

  .link-text {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    flex: 1;
  }

  .link-label {
    font-size: 7.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #999;
    font-weight: 400;
  }

  .link-value {
    font-size: 12.5px;
    font-weight: 300;
    color: #111;
  }

  .link-item:hover .link-label, .link-item:active .link-label { color: #666; }
</style>
</head>

<script>

    const vcard = ['BEGIN:VCARD','VERSION:3.0','FN:Safouene Mahfoudh','N:Mahfoudh;Safouene;;;','TITLE:IoT Developer','ORG:Industrie 4.0','TEL;TYPE=CELL:+33600000000','EMAIL:safouene.mahfoudh@gmail.com','URL:https://tonsite.com','URL;TYPE=LinkedIn:https://linkedin.com/in/tonprofil','END:VCARD'].join('\r\n');
